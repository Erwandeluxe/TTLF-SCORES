<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTLF Scores – Playoffs 2026</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#f9f8f5;--surface-2:#fbfbf9;--surface-off:#edeae5;
  --divider:#dcd9d5;--border:#d4d1ca;
  --text:#28251d;--text-muted:#7a7974;--text-faint:#bab9b4;
  --primary:#01696f;--error:#a12c7b;--success:#437a22;--gold:#c98d00;
  --radius-lg:.75rem;--radius-full:9999px;
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/.1);--tr:180ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --bg:#171614;--surface:#1c1b19;--surface-2:#201f1d;--surface-off:#22211f;
  --divider:#262523;--border:#393836;
  --text:#cdccca;--text-muted:#797876;--text-faint:#5a5957;
  --primary:#4f98a3;--error:#d163a7;--success:#6daa45;--gold:#e8af34;
  --shadow-md:0 4px 12px oklch(0 0 0/.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;font-family:'Satoshi',sans-serif;color:var(--text);background:var(--bg);line-height:1.5}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;transition:all var(--tr)}
a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.nav-brand{font-weight:700;font-size:1.1rem;letter-spacing:-.02em;color:var(--primary)}
.nav-right{display:flex;align-items:center;gap:.75rem}
.btn-home{display:flex;align-items:center;gap:.4rem;padding:.4rem .85rem;border-radius:var(--radius-full);background:var(--surface-off);font-size:.85rem;font-weight:500}
.btn-home:hover{background:var(--border)}
.btn-theme{width:2rem;height:2rem;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;background:var(--surface-off)}
.btn-theme:hover{background:var(--border)}
.nav-updated{font-size:.7rem;color:var(--text-faint)}
.container{max-width:700px;margin:0 auto;padding:2rem 1.25rem}
.filter-bar{margin-bottom:1.75rem}
.filter-label{font-size:.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem}
.filter-row{display:flex;flex-wrap:wrap;gap:.45rem}
.filter-btn{padding:.32rem .75rem;border-radius:var(--radius-full);border:1px solid var(--border);font-size:.8rem;font-weight:500;background:var(--surface);color:var(--text-muted)}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.picks-grid{display:flex;flex-direction:column;gap:1rem}
.pick-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow var(--tr)}
.pick-card:hover{box-shadow:var(--shadow-md)}
.card-header{padding:.75rem 1rem .65rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;border-bottom:1px solid var(--divider)}
.card-meta{font-size:.72rem;color:var(--text-faint);line-height:1.4}
.card-meta strong{display:block;font-size:.78rem;color:var(--text-muted);margin-bottom:.1rem;font-weight:600}
.pick-badge{font-size:.68rem;font-weight:700;padding:.15rem .5rem;border-radius:var(--radius-full);letter-spacing:.04em;flex-shrink:0;white-space:nowrap}
.badge-final{background:color-mix(in oklch,var(--success) 14%,var(--surface));color:var(--success)}
.badge-live{background:color-mix(in oklch,var(--error) 14%,var(--surface));color:var(--error);animation:pulse 1.5s ease-in-out infinite}
.badge-soon{background:color-mix(in oklch,var(--gold) 14%,var(--surface));color:var(--gold)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;gap:.5rem}
.team-side{display:flex;flex-direction:column;align-items:center;gap:.3rem;min-width:58px}
.team-logo{width:36px;height:36px;object-fit:contain;border-radius:50%;background:var(--surface-off)}
.team-code{font-size:.78rem;font-weight:700;letter-spacing:.05em;color:var(--text-muted)}
.score-center{display:flex;flex-direction:column;align-items:center;gap:.18rem;flex:1}
.score-main{display:flex;align-items:center;gap:.55rem}
.score-num{font-size:2rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.score-dash{font-size:1rem;color:var(--text-faint)}
.series-txt{font-size:.68rem;color:var(--text-muted);text-align:center}
.expand-btn{width:100%;padding:.5rem 1rem;font-size:.78rem;font-weight:600;color:var(--primary);display:flex;align-items:center;justify-content:center;gap:.35rem;border-top:1px solid var(--divider)}
.expand-btn:hover{background:color-mix(in oklch,var(--primary) 5%,var(--surface))}
.expand-btn svg{transition:transform .22s ease}
.expand-btn.open svg{transform:rotate(180deg)}
.boxscore-panel{display:none;border-top:1px solid var(--divider);overflow-x:auto}
.boxscore-panel.open{display:block}
.bs-team-header{padding:.5rem .9rem .3rem;font-size:.71rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;background:var(--surface-2);display:flex;align-items:center;gap:.45rem}
.bs-team-header img{width:16px;height:16px;border-radius:50%}
.bs-table{width:100%;border-collapse:collapse}
.bs-table th{font-size:.62rem;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;padding:.32rem .7rem;text-align:right;border-bottom:1px solid var(--divider);background:var(--surface-2)}
.bs-table th:nth-child(1){text-align:right}
.bs-table th:nth-child(2){text-align:right}
.bs-table th:nth-child(3){text-align:right}
.bs-table th:nth-child(4){text-align:left}
.bs-table td{font-size:.77rem;padding:.38rem .7rem;text-align:right;border-bottom:1px solid color-mix(in oklch,var(--divider) 45%,transparent)}
.bs-table td:nth-child(4){text-align:left;font-weight:600;color:var(--text)}
.bs-table tr:last-child td{border-bottom:none}
.bs-table tr:hover td{background:color-mix(in oklch,var(--primary) 4%,var(--surface))}
.col-bonus{color:var(--success);font-weight:800}
.col-malus{color:var(--error);font-weight:800}
.col-total{font-weight:800}
.ttfl-god{color:#f0c040}
.ttfl-great{color:var(--gold)}
.ttfl-ok{color:var(--text)}
.ttfl-bad{color:var(--text-muted)}
.ttfl-neg{color:var(--error)}
.th-bonus{color:var(--success) !important}
.th-malus{color:var(--error) !important}
.th-total{color:var(--gold) !important}
.bs-legend{padding:.4rem .9rem;font-size:.63rem;color:var(--text-faint);background:var(--surface-2);border-top:1px solid var(--divider);line-height:1.8}
.bs-loading{padding:1.25rem;text-align:center;font-size:.8rem;color:var(--text-faint)}
.empty{text-align:center;padding:4rem 1rem;color:var(--text-muted)}
.global-loading{text-align:center;padding:3rem;color:var(--text-muted);font-size:.9rem}
</style>
</head>

  {gameId:"0042500174",gameDateTimeUTC:"2026-04-27T01:30:00Z",gameLabel:"West 1st Round",gameSubLabel:"Game 4",seriesText:"LAL leads 3-0",homeTeamTricode:"HOU",homeTeamId:1610612745,homeScore:0,awayTeamTricode:"LAL",awayTeamId:1610612747,awayScore:0}
];

let liveIndex={};

function logo(id){return"https://cdn.nba.com/logos/nba/"+id+"/global/L/logo.svg"}
function seriesKey(g){return[g.homeTeamTricode,g.awayTeamTricode].sort().join("-")}

const seriesMap={};
GAMES.forEach(g=>{
  const k=seriesKey(g);
  if(!seriesMap[k])seriesMap[k]={key:k,label:[g.homeTeamTricode,g.awayTeamTricode].sort().join(" / ")};
});
const allSeries=Object.values(seriesMap);
let activeSeries="ALL";

function buildFilters(){
  const fr=document.getElementById("filterRow");fr.innerHTML="";
  const a=document.createElement("button");
  a.className="filter-btn"+(activeSeries==="ALL"?" active":"");
  a.textContent="Tous";
  a.onclick=()=>{activeSeries="ALL";buildFilters();renderCards()};
  fr.appendChild(a);
  allSeries.forEach(s=>{
    const b=document.createElement("button");
    b.className="filter-btn"+(activeSeries===s.key?" active":"");
    b.textContent=s.label;
    b.onclick=()=>{activeSeries=s.key;buildFilters();renderCards()};
    fr.appendChild(b);
  });
}

function ttlfClass(v){
  if(v===null||v===undefined)return"ttfl-ok";
  if(v>=60)return"ttfl-god";
  if(v>=40)return"ttfl-great";
  if(v>=20)return"ttfl-ok";
  if(v>=0)return"ttfl-bad";
  return"ttfl-neg";
}

function calcBonus(p){
  return p.pts + p.reb + p.ast + p.stl + p.blk + p.fgm + p.tpm + p.ftm;
}
function calcMalus(p){
  return p.to + (p.fga - p.fgm) + (p.tpa - p.tpm) + (p.fta - p.ftm);
}

function buildTeamTable(teamData,teamId){
  if(!teamData||!teamData.players||!teamData.players.length)
    return'<p style="padding:.75rem 1rem;text-align:center;font-size:.78rem;color:var(--text-faint)">Pas de donnees joueurs</p>';
  const rows=teamData.players.map(p=>{
    const bonus=calcBonus(p);
    const malus=calcMalus(p);
    const total=bonus-malus;
    return "<tr>"
      +"<td class='col-bonus'>"+bonus+"</td>"
      +"<td class='col-malus'>-"+malus+"</td>"
      +"<td class='col-total "+ttlfClass(total)+"'>"+total+"</td>"
      +"<td>"+p.name+"</td>"
      +"<td>"+p.min+"'</td>"
      +"<td>"+p.pts+"</td>"
      +"<td>"+p.reb+"</td>"
      +"<td>"+p.ast+"</td>"
      +"<td>"+p.stl+"</td>"
      +"<td>"+p.blk+"</td>"
      +"<td>"+p.to+"</td>"
      +"<td>"+p.fgm+"/"+p.fga+"</td>"
      +"<td>"+p.tpm+"/"+p.tpa+"</td>"
      +"<td>"+p.ftm+"/"+p.fta+"</td>"
      +"</tr>";
  }).join("");
  return'<div class="bs-team-header"><img src="'+logo(teamId)+'" width="16" height="16"> '+teamData.tricode+'</div>'
    +'<table class="bs-table"><thead><tr>'
    +'<th class="th-bonus">BON</th>'
    +'<th class="th-malus">MAL</th>'
    +'<th class="th-total">TOT</th>'
    +'<th style="text-align:left">Joueur</th>'
    +'<th>Min</th><th>PTS</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TO</th><th>TL</th><th>3P</th><th>LF</th>'
    +'</tr></thead><tbody>'+rows+"</tbody></table>";
}

function toggleBoxscore(gameId,panelEl,btnEl){
  if(panelEl.classList.contains("open")){panelEl.classList.remove("open");btnEl.classList.remove("open");return}
  panelEl.classList.add("open");btnEl.classList.add("open");
  const live=liveIndex[gameId];
  const gDef=GAMES.find(g=>g.gameId===gameId);
  if(!live){panelEl.innerHTML='<div class="bs-loading">Stats non disponibles.</div>';return}
  panelEl.innerHTML=
    buildTeamTable(live.homeTeam,gDef.homeTeamId)+
    buildTeamTable(live.awayTeam,gDef.awayTeamId)+
    '<div class="bs-legend">BON = PTS+REB+AST+STL+BLK+TL+3P+LF reussis | MAL = TO+TL rates+3P rates+LF rates | TOT = BON - MAL</div>';
}

function renderCards(){
  const grid=document.getElementById("picksGrid");
  let games=[...GAMES].sort((a,b)=>new Date(b.gameDateTimeUTC)-new Date(a.gameDateTimeUTC));
  if(activeSeries!=="ALL")games=games.filter(g=>seriesKey(g)===activeSeries);
  if(!games.length){grid.innerHTML='<div class="empty">Aucun match</div>';return}
  grid.innerHTML=games.map(g=>{
    const live=liveIndex[g.gameId];
    const status=live?live.gameStatus:1;
    const statusText=live?live.gameStatusText:"--";
    const hScore=live?live.homeTeam.score:(g.homeScore||"--");
    const aScore=live?live.awayTeam.score:(g.awayScore||"--");
    const isF=status===3,isL=status===2;
    const badgeCls=isF?"badge-final":isL?"badge-live":"badge-soon";
    const badgeTxt=isF?"Final":isL?"LIVE"+(live.gameClock?" "+live.gameClock:""):statusText;
    const showScore=isF||isL;
    const dt=new Date(g.gameDateTimeUTC);
    const dateStr=dt.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});
    const canExpand=isF||isL;
    return'<div class="pick-card">'
      +'<div class="card-header"><div class="card-meta"><strong>'+g.gameLabel+" - "+g.gameSubLabel+"</strong>"+dateStr+'</div><span class="pick-badge '+badgeCls+'">'+badgeTxt+"</span></div>"
      +'<div class="score-row">'
      +'<div class="team-side"><img class="team-logo" src="'+logo(g.homeTeamId)+'" loading="lazy" width="36" height="36"><span class="team-code">'+g.homeTeamTricode+"</span></div>"
      +'<div class="score-center"><div class="score-main"><span class="score-num">'+(showScore?hScore:"-")+'</span><span class="score-dash">-</span><span class="score-num">'+(showScore?aScore:"-")+'</span></div><div class="series-txt">'+(g.seriesText||"")+"</div></div>"
      +'<div class="team-side"><img class="team-logo" src="'+logo(g.awayTeamId)+'" loading="lazy" width="36" height="36"><span class="team-code">'+g.awayTeamTricode+"</span></div>"
      +"</div>"
      +(canExpand?'<button class="expand-btn" id="btn-'+g.gameId+'" onclick="toggleBoxscore(\''+g.gameId+'\',document.getElementById(\'bs-'+g.gameId+'\'),this)">Stats joueurs &amp; TTLF <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button><div class="boxscore-panel" id="bs-'+g.gameId+'"></div>':"")
      +"</div>";
  }).join("");
}

async function loadData(){
  try{
    const r=await fetch(GAS_URL);
    const d=await r.json();
    (d.games||[]).forEach(g=>{liveIndex[g.gameId]=g});
    const upd=new Date(d.updated);
    document.getElementById("navUpdated").textContent="Maj "+upd.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  }catch(e){console.warn("GAS error",e)}
  buildFilters();
  renderCards();
}

(function(){
  const t=document.querySelector("[data-theme-toggle]"),r=document.documentElement;
  if(!t)return;
  t.addEventListener("click",()=>{
    const d=r.getAttribute("data-theme")==="dark"?"light":"dark";
    r.setAttribute("data-theme",d);
    t.innerHTML=d==="dark"
      ?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
      :'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  });
})();

loadData();
setInterval(()=>{liveIndex={};loadData()},120000);
</script>
